apiVersion: v1
kind: Service
metadata:
  name: estadisticas-service
  labels:
    app: estadisticas-service
spec:
  type: ClusterIP # ¡Crucial! No debe ser LoadBalancer
  selector:
    app: estadisticas-service # Debe coincidir con el label del Deployment
  ports:
    - protocol: TCP
      port: 8006       # Puerto que usarán los otros servicios para llamar al servicio
      targetPort: 8006 # Puerto que escucha tu aplicación en el pod