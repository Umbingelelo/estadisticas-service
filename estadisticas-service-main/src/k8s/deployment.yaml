apiVersion: apps/v1
kind: Deployment
metadata:
  name: estadisticas-service
  labels:
    app: estadisticas-service # Coherente
spec:
  replicas: 2
  selector:
    matchLabels:
      app: estadisticas-service # Coherente
  template:
    metadata:
      labels:
        app: estadisticas-service
    spec:
      containers:
        - name: estadisticas-service # Coherente
          image: 511249208390.dkr.ecr.us-east-1.amazonaws.com/estadisticas-service:latest # Asegúrate de cambiar la imagen
          ports:
            - containerPort: 8006 # Puerto del backend
          # Recuerda configurar aquí tus probes /livez y /readyz
          # Y pasar el Secret casino-secrets mediante envFrom
          envFrom:
          - secretRef:
              name: casino-secrets
          livenessProbe:
            httpGet:
              path: /livez
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"